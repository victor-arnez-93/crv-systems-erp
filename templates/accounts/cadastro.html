{% extends 'base.html' %}
{% load static %}

{% block title %}Cadastro – CRV Systems{% endblock %}

{% block head %}
  <link rel="stylesheet" href="{% static 'css/inicio.css' %}">
{% endblock %}

{% block content %}
<div class="overlay">
  <div class="initial-card" style="width:100%; max-width:460px; margin:0 auto; padding:24px; box-sizing:border-box;">

    <!-- Título padronizado (igual aos modais) -->
    <div class="card-title">
      <i class="fas fa-user-plus"></i>
      <span>Cadastro</span>
    </div>
    <div class="modal-divider"></div>

    <!-- Formulário -->
    <form id="registerForm" method="post" novalidate style="display:flex; flex-direction:column; gap:16px;">
      {% csrf_token %}

      <!-- Passo 1 -->
      <div class="input-group step step-show">
        <label class="input-label" style="display:block; text-align:center;">Nome completo</label>
        <input type="text" name="full_name" class="input-field text-center" required minlength="3"
               placeholder="Digite seu nome completo" style="text-align:center;">
      </div>

      <!-- Passo 2 -->
      <div id="step-email" class="input-group step step-hidden">
        <label class="input-label" style="display:block; text-align:center;">E-mail</label>
        <input type="email" name="email" class="input-field text-center" required
               placeholder="seuemail@dominio.com" style="text-align:center;">
      </div>

      <!-- Passo 3 -->
      <div id="step-user-pass" class="step step-hidden" style="display:flex; gap:16px;">
        <div class="input-group" style="flex:1;">
          <label class="input-label" style="display:block; text-align:center;">Usuário</label>
          <input type="text" name="username" class="input-field text-center" required minlength="3"
                 placeholder="Digite seu usuário" style="text-align:center;">
        </div>
        <div class="input-group" style="flex:1;">
          <label class="input-label" style="display:block; text-align:center;">Senha</label>
          <input type="password" name="password1" class="input-field text-center" required minlength="6"
                 placeholder="Mínimo 6 caracteres" style="text-align:center;">
        </div>
      </div>

      <!-- Erro front -->
      <div id="formError" style="display:none;color:#ff9aa5;font-size:.9rem;text-align:center;margin-top:2px;">
        Preencha todos os campos corretamente.
      </div>

      <!-- Ações -->
      <div style="display:flex; justify-content:space-between; margin-top:10px;">
        <button type="button" class="button primary" onclick="history.back()">VOLTAR</button>
        <button id="submitBtn" type="submit" class="button primary" disabled>CADASTRAR</button>
      </div>
    </form>
  </div>
</div>

<!-- JS inline (SPA-safe) -->
<script data-spa-script>
(function(){
  function isValidEmail(v){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test((v||'').trim()); }
  function show(el){ if(!el) return; el.classList.remove('step-hidden'); el.classList.add('step-show'); }

  function bind(){
    const form = document.getElementById('registerForm');
    if(!form) return;

    const stepEmail   = document.getElementById('step-email');
    const stepUserPwd = document.getElementById('step-user-pass');
    const btn = document.getElementById('submitBtn');
    const err = document.getElementById('formError');

    // Progressivo: Nome -> Email -> Usuário/Senha
    const onNome  = ()=>{ if((form.full_name.value||'').trim().length>0) show(stepEmail);  validate(); };
    const onEmail = ()=>{ if(isValidEmail(form.email.value))            show(stepUserPwd); validate(); };

    form.full_name.addEventListener('input', onNome);
    form.full_name.addEventListener('change', onNome);
    form.email.addEventListener('input', onEmail);
    form.email.addEventListener('change', onEmail);

    // Se voltar do histórico com valores, revela imediatamente
    if((form.full_name.value||'').trim()) show(stepEmail);
    if(isValidEmail(form.email.value||'')) show(stepUserPwd);

    // Validação + habilitação do botão
    function validate(){
      const okNome  = (form.full_name.value||'').trim().length >= 3;
      const okEmail = isValidEmail(form.email.value||'');
      const okUser  = (form.username.value||'').trim().length >= 3;
      const okPass  = (form.password1.value||'').length >= 6;
      const ok = okNome && okEmail && okUser && okPass;

      btn.disabled = !ok;
      btn.style.opacity = ok ? '1' : '.55';
      btn.style.cursor  = ok ? 'pointer' : 'not-allowed';
      if(ok && err) err.style.display = 'none';
    }
    form.addEventListener('input',  validate);
    form.addEventListener('change', validate);
    validate();

    // Bloqueia submit se inválido (apenas UX)
    form.addEventListener('submit', function(e){
      if(btn.disabled){
        e.preventDefault();
        if(err) err.style.display = 'block';
      }
    });
  }

  // roda no load e após injeção SPA
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', bind);
  else bind();
  document.addEventListener('spa-page-loaded', bind);
})();
</script>
{% endblock %}
