{# templates/partials/widget_card.html #}
<div class="widget-card p-4 rounded-lg shadow-md flex items-center space-x-4 {{ color_class }}">
  <div class="p-3 rounded-full bg-white bg-opacity-20">
    <i class="{{ icon }} text-white text-2xl"></i>
  </div>
  <div class="text-white">
    <p class="text-sm">{{ title }}</p>
    <h2 class="text-xl font-semibold">{{ value }}</h2>
  </div>
</div>
